{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управління завданнями</title>
<!--    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{% static 'css/site.css' %}" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'tasks:task-list' %}">
                𐔌՞ ܸ.ˬ.ܸ՞𐦯 TaskTracking
            </a>

            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <form action="{% url 'tasks:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            Вихід
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm me-2" href="{% url 'tasks:login' %}">
                        Вхід
                    </a>
                    <a class="btn btn-light btn-sm" href="{% url 'tasks:register' %}">
                        Реєстрація
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
